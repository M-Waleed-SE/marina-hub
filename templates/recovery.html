<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="forget.css">
</head>
<body>

<div class="container">

    <div class="left-side">

        <div class="login-box">

            <h1>Reset Password</h1>

            <p class="subtitle">
                Create a new secure password for your account
            </p>

            <form method="POST" action="/recovery">
                <input type="password" name="password" placeholder="New Password" required>

                <input type="password" name="confirmPassword" placeholder="Confirm Password" required>

                <button type="submit">Reset Password</button>
            </form>

            <p class="signup">
                Back to
                <a href="index.html">Sign In</a>
            </p>

        </div>

    </div>

    <div class="right-side">

        <div class="overlay"></div>

        <div class="brand-header">
            <img src="logo.png" alt="Logo">
            <div class="brand-name">MARENA HUB</div>
        </div>

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop" alt="Study Image">

        <div class="image-text">
            <h2>Secure Your Account</h2>
            <p>Reset your password and continue your learning journey safely.</p>
        </div>

    </div>

</div>

</body>
</html>
