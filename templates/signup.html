<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>

    <link rel="stylesheet" href="signup.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left-side">

        <div class="signup-box">

            <h1>Create Account</h1>

            <p class="subtitle">
                Join MARINA HUB and start learning today
            </p>

            <form id="signupForm" method="POST" action="/signup">
                <input type="text" name="fullName" id="fullName" placeholder="Full Name" required>

                <input type="email" name="email" id="email" placeholder="Email Address" required>

                <input type="text" name="username" placeholder="Username" required>

                <input type="password" name="password" placeholder="Password" required>

                <input type="password" name="confirmPassword" placeholder="Confirm Password" required>

                <button type="submit">
                    Sign Up
                </button>
            </form>

            <p class="login-link">
                Already have an account?
               <a href="index.html">Sign In</a>
            </p>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-side">

        <div class="overlay"></div>

        <div class="brand-header">

            <img src="logo.png" alt="Logo">

            <div class="brand-name">
                MARENA HUB
            </div>

        </div>

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop"
        alt="Study Image">

        <div class="image-text">

            <h2>Build Your Future</h2>

            <p>
                Create your account and explore professional coding resources.
            </p>

        </div>

    </div>

</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    let fullName = document.getElementById("fullName").value;
    localStorage.setItem("studentName", fullName);
});
</script>
</body>
</html>
