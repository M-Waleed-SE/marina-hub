<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 , user scalable=yes">
    <title>Marena Hub | Sign in</title>
    <!-- We're linking the CSS file below -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

    <!-- LEFT LOGIN SIDE -->

    <div class="left-side">

        <div class="login-box">

            <h1>Welcome Back</h1>

            <p class="subtitle">
                Sign in to continue your learning journey
            </p>

            <form id="loginForm" method="POST" action="/login">
               <input type="text" id="username" name="username" placeholder="Enter Your Name" required>
               <input type="password" name="password" placeholder="Password" required>
               <button type="submit">Sign in</button>
            </form>

             <p class="forgot"></p>
               <a href="forget.html">Forgot Password?</a>
            <p class="signup">
                Don’t have an account?
                <a href="signup.html">Create Account</a>
            </p>

        </div>

    </div>

    <!-- RIGHT IMAGE SIDE -->

    <div class="right-side">

        <div class="overlay"></div>

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop" alt="Study Image">

        <div class="brand-header">
            <img src="logo.png" alt="Logo">
            <div class="brand-name">MARENA HUB</div>
        </div>

        <div class="image-text">
            <h2>Learn. Build. Grow.</h2>
            <p>Master coding with modern resources and interactive learning.</p>
        </div>

    </div>

</div>

</body>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    let userName = document.getElementById("username").value;
    localStorage.setItem("studentName", userName);
});
</script>
</html>
