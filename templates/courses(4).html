<!DOCTYPE html>
<html>

<head>

    <title>JS Quiz</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='styling.css') }}">

</head>

<body>

<div class="container">

    <div class="top-buttons">

    <a href="javascript:history.back()" class="btn">
        ⬅ Back
    </a>

    <a href="/leaderboard" class="btn">
        🏆 Leaderboard
    </a>

</div>

    <h1>JS Quiz</h1>

    <form action="/submit" method="POST">
        <input type="hidden" name="course" value="js">

        <input
        type="text"
        name="username"
        placeholder="Enter Your Name"
        required>

        {% for q in questions %}

        {% set question_index = loop.index0 %}

        <div class="question-box">

            <h3>

                {{ loop.index }}.
                {{ q.question }}

            </h3>

            {% for option in q.options %}

            <label>

                <input
                type="radio"
                name="q{{ question_index }}"
                value="{{ option }}"
                required>

                {{ option }}

            </label>

            {% endfor %}

        </div>

        {% endfor %}

        <button type="submit">

            Submit Quiz

        </button>

    </form>

</div>

</body>
</html>
